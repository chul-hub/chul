<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>스페이스 리듬 벽돌깨기</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <main class="game-container">
      <header class="hud">
        <h1>스페이스 리듬 벽돌깨기</h1>
        <div class="hud__stats">
          <div class="hud__item">점수: <span id="score">0</span></div>
          <div class="hud__item">레벨: <span id="level">1</span></div>
          <div class="hud__item">남은 생명: <span id="lives">3</span></div>
        </div>
      </header>
      <section class="canvas-wrapper">
        <canvas id="gameCanvas" width="960" height="640" aria-label="벽돌깨기 게임 캔버스"></canvas>
        <div id="message" class="message" role="status" aria-live="polite"></div>
      </section>
      <section class="help">
        <h2>조작 방법</h2>
        <ul>
          <li>← → 방향키 또는 마우스를 움직여 패들을 이동하세요.</li>
          <li>스페이스바를 눌러 일시 정지/재개를 할 수 있습니다.</li>
          <li>특수 벽돌을 부수면 다양한 강화 아이템이 떨어집니다.</li>
        </ul>
      </section>
    </main>
    <script src="assets/js/game.js" type="module"></script>
  </body>
</html>
